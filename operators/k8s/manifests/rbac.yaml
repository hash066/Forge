apiVersion: v1
kind: Namespace
metadata:
  name: devforge-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: devforge-operator
  namespace: devforge-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: devforge-operator
rules:
  # Observe the cluster
  - apiGroups: [""]
    resources: ["pods", "pods/log", "events", "nodes", "namespaces", "services"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch"]
  # Remediate (least-privilege: only what the actions need)
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["delete"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["patch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "deployments/scale"]
    verbs: ["patch", "update"]
  # Read its own policy CRD
  - apiGroups: ["devforge.io"]
    resources: ["remediationpolicies"]
    verbs: ["get", "list", "watch", "patch"]
  # kopf bookkeeping
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: devforge-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: devforge-operator
subjects:
  - kind: ServiceAccount
    name: devforge-operator
    namespace: devforge-system
