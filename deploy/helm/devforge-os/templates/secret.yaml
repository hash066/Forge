{{- if and .Values.ai.openaiApiKey (not .Values.ai.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: devforge-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "devforge-os.labels" . | nindent 4 }}
type: Opaque
stringData:
  OPENAI_API_KEY: {{ .Values.ai.openaiApiKey | quote }}
{{- end }}
