# Deliberately-broken workloads for the DevForge OS live demo.
# Apply to a real cluster; the operator detects each fault, the control plane
# diagnoses it with AI, and (per RemediationPolicy) heals it.
#
#   kubectl apply -f demo/workloads.yaml
#
# Faults covered: CrashLoopBackOff, OOMKilled, ImagePullBackOff, PrivilegedPod,
# MissingLimits, Unschedulable.
---
apiVersion: v1
kind: Namespace
metadata: { name: shop }
---
apiVersion: v1
kind: Namespace
metadata: { name: ml }
---
apiVersion: v1
kind: Namespace
metadata: { name: observability }
---
apiVersion: v1
kind: Namespace
metadata: { name: data }
---
# 1) CrashLoopBackOff — container exits non-zero on startup
apiVersion: apps/v1
kind: Deployment
metadata: { name: payments-api, namespace: shop, labels: { app: payments-api } }
spec:
  replicas: 1
  selector: { matchLabels: { app: payments-api } }
  template:
    metadata: { labels: { app: payments-api } }
    spec:
      containers:
        - name: payments-api
          image: busybox:1.36
          command: ["sh", "-c", "echo 'booting payments-api'; sleep 3; echo 'config missing'; exit 1"]
          resources:
            requests: { cpu: "50m", memory: "32Mi" }
            limits: { cpu: "200m", memory: "64Mi" }
---
# 2) OOMKilled — memory limit far below the working set
apiVersion: apps/v1
kind: Deployment
metadata: { name: cart-api, namespace: shop, labels: { app: cart-api } }
spec:
  replicas: 1
  selector: { matchLabels: { app: cart-api } }
  template:
    metadata: { labels: { app: cart-api } }
    spec:
      containers:
        - name: cart-api
          image: busybox:1.36
          command: ["sh", "-c", "echo 'allocating'; tail /dev/zero"]
          resources:
            requests: { cpu: "50m", memory: "16Mi" }
            limits: { cpu: "100m", memory: "16Mi" }
---
# 3) ImagePullBackOff — image tag does not exist
apiVersion: apps/v1
kind: Deployment
metadata: { name: recommender, namespace: ml, labels: { app: recommender } }
spec:
  replicas: 1
  selector: { matchLabels: { app: recommender } }
  template:
    metadata: { labels: { app: recommender } }
    spec:
      containers:
        - name: recommender
          image: ghcr.io/devforge/recommender:v3.1.0-does-not-exist
          resources:
            requests: { cpu: "50m", memory: "32Mi" }
            limits: { cpu: "200m", memory: "64Mi" }
---
# 4) PrivilegedPod — privileged + hostPath (security finding)
apiVersion: apps/v1
kind: Deployment
metadata: { name: log-forwarder, namespace: observability, labels: { app: log-forwarder } }
spec:
  replicas: 1
  selector: { matchLabels: { app: log-forwarder } }
  template:
    metadata: { labels: { app: log-forwarder } }
    spec:
      containers:
        - name: log-forwarder
          image: busybox:1.36
          command: ["sh", "-c", "sleep 100000"]
          securityContext: { privileged: true, runAsUser: 0 }
          volumeMounts: [{ name: varlog, mountPath: /var/log }]
          resources:
            requests: { cpu: "25m", memory: "32Mi" }
            limits: { cpu: "100m", memory: "64Mi" }
      volumes:
        - name: varlog
          hostPath: { path: /var/log }
---
# 5) MissingLimits — no resource limits set
apiVersion: apps/v1
kind: Deployment
metadata: { name: analytics-worker, namespace: data, labels: { app: analytics-worker } }
spec:
  replicas: 1
  selector: { matchLabels: { app: analytics-worker } }
  template:
    metadata: { labels: { app: analytics-worker } }
    spec:
      containers:
        - name: analytics-worker
          image: busybox:1.36
          command: ["sh", "-c", "sleep 100000"]
          resources:
            requests: { cpu: "25m", memory: "32Mi" }
---
# 6) Unschedulable — requests exceed any node's capacity
apiVersion: apps/v1
kind: Deployment
metadata: { name: batch-trainer, namespace: ml, labels: { app: batch-trainer } }
spec:
  replicas: 1
  selector: { matchLabels: { app: batch-trainer } }
  template:
    metadata: { labels: { app: batch-trainer } }
    spec:
      containers:
        - name: batch-trainer
          image: busybox:1.36
          command: ["sh", "-c", "sleep 100000"]
          resources:
            requests: { cpu: "8", memory: "32Gi" }
            limits: { cpu: "8", memory: "32Gi" }
